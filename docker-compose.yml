version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: difm_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-bank_extractor}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - difm_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: difm_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - difm_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: difm_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bank_extractor}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: ${API_PORT:-5000}
      OCR_SERVICE_URL: http://ocr-service:8000
    ports:
      - "${API_PORT:-5000}:${API_PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./storage:/app/storage
    networks:
      - difm_network

  # Python OCR Service
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: difm_ocr
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      OCR_PORT: ${OCR_PORT:-8000}
    ports:
      - "${OCR_PORT:-8000}:8000"
    volumes:
      - ./ocr-service/app:/app/app
      - ./storage/temp:/app/temp
    networks:
      - difm_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Frontend (optional - usually run separately during dev)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: difm_frontend
  #   ports:
  #     - "${FRONTEND_PORT:-3000}:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-5000}
  #   depends_on:
  #     - backend
  #   networks:
  #     - difm_network

volumes:
  postgres_data:
  redis_data:

networks:
  difm_network:
    driver: bridge
